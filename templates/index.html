<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiniMailer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet"/>

    <style>
      body {
        min-height: 100vh;
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        padding-top: 90px;
      }

      .navbar {
        background: rgba(0, 0, 0, 0.7) !important;
        backdrop-filter: blur(10px);
      }

      .nav-link {
        color: white !important;
        transition: 0.3s;
      }

      .nav-link:hover {
        color: #ffd43b !important;
      }

      .mailer-wrapper {
        width: 100%;
        max-width: 1100px;
        margin: auto;
      }

      .mailer-card {
        background: white;
        border-radius: 20px;
        padding: 45px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        animation: cardEnter 0.8s ease;
      }

      @keyframes cardEnter {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .mailer-title {
        font-weight: 600;
      }

      .form-label {
        font-weight: 500;
      }

      .form-control {
        border-radius: 12px;
        padding: 12px;
        background: #f5f7fb;
        border: 1px solid #d0d7e2;
      }

      .form-control:focus {
        background: #fff;
        box-shadow: 0 0 0 2px #4dabf7;
      }

      .send-btn {
        background: linear-gradient(135deg, #339af0, #1c7ed6);
        border: none;
        border-radius: 12px;
        padding: 14px;
        color: white;
        font-size: 16px;
      }

      .send-btn:hover {
        transform: scale(1.05);
      }

      .generate-btn {
        position: absolute;
        top: 50%;
        right: 10px;
        transform: translateY(-50%);
        background: #ffd43b;
        border: none;
        border-radius: 10px;
        padding: 6px 10px;
      }

      .shortcut-wrapper {
        position: relative;
      }

      textarea {
        min-height: 180px;
        resize: none;
        overflow: hidden;
        line-height: 1.6;
        font-size: 15px;
      }

      /* 🔥 Info note */
      .auto-info {
        background: #e7f5ff;
        padding: 10px;
        border-radius: 10px;
        font-size: 14px;
        margin-bottom: 15px;
        color: #0c5460;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/">
          <i class="bi bi-envelope-paper-fill"></i> MiniMailer
        </a>

        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="/">Home</a>
          <a class="nav-link" href="/index">Send Email</a>
          <a class="nav-link" href="{{ url_for('history') }}">History</a>
          <a class="nav-link" href="{{ url_for('chat_help') }}">AI Help</a>
          <a class="nav-link text-danger" href="{{ url_for('logout') }}">Logout</a>
        </div>
      </div>
    </nav>

    <!-- MAIN CARD -->
    <div class="mailer-wrapper">
      <div class="mailer-card">

        <h4 class="mailer-title mb-3">
          <i class="bi bi-envelope-paper-fill"></i> Send Email
        </h4>

        <!-- 🔥 AUTO EMAIL INFO -->
        <div class="auto-info">
          ⚡ Emails will be sent automatically using system email (no need to enter sender email/password)
        </div>

        <!-- AI Generate -->
        <form method="POST" action="{{ url_for('generate_email') }}">
          <div class="mb-3 shortcut-wrapper">
            <label class="form-label">
              <i class="bi bi-lightning-fill"></i> Email Prompt
            </label>

            <input type="text" name="topic" class="form-control"
              placeholder="Enter email topic or purpose for AI" />

            <button type="submit" class="generate-btn" formnovalidate>
              <i class="bi bi-robot"></i>
            </button>
          </div>

          <div class="mb-3">
            <label class="form-label">
              <i class="bi bi-card-list"></i> Email Type
            </label>

            <select name="email_type" class="form-control">
              <option value="">Select type</option>
              <option value="formal">Formal</option>
              <option value="informal">Informal</option>
              <option value="professional">Professional</option>
            </select>
          </div>
        </form>

        <!-- SEND EMAIL -->
        <form method="POST" action="/index" enctype="multipart/form-data">

          <div class="mb-3">
            <label class="form-label">Subject</label>
            <input type="text" name="subject" class="form-control"
              value="{{ generated_subject }}" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Message</label>

            <textarea id="messageBox" name="body"
              class="form-control" required></textarea>

            <input type="hidden" id="fullMessage"
              value="{{ generated_email }}" />
          </div>

          <div class="mb-3">
            <label class="form-label">Recipient Email</label>
            <input type="email" name="receiver_email"
              class="form-control" required />
          </div>

          <div class="mb-4">
            <label class="form-label">Attachment</label>
            <input type="file" name="attachment" class="form-control" />
          </div>

          <button type="submit" class="btn send-btn w-100">
            <i class="bi bi-send-fill"></i> Send Email
          </button>

        </form>
      </div>
    </div>

    <!-- 🔥 JS Typing Effect -->
    <script>
      const textarea = document.getElementById("messageBox");
      const fullText = document.getElementById("fullMessage").value;

      let i = 0;

      function typeEffect() {
        if (i < fullText.length) {
          textarea.value += fullText.charAt(i);
          i++;

          textarea.style.height = "auto";
          textarea.style.height = textarea.scrollHeight + "px";

          setTimeout(typeEffect, 15);
        }
      }

      window.onload = typeEffect;
    </script>
  </body>
</html>
