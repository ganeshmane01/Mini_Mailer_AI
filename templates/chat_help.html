<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiniMailer AI Help</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet"/>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet"/>

    <style>
      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        min-height: 100vh;
        padding-top: 90px;
      }

      /* NAVBAR */
      .navbar {
        background: rgba(0, 0, 0, 0.7) !important;
        backdrop-filter: blur(10px);
      }

      .nav-link {
        color: white !important;
      }

      .nav-link:hover {
        color: #ffd43b !important;
      }

      /* 🔥 BIGGER CONTAINER */
      .big-container {
        max-width: 900px;
        margin: auto;
      }

      /* CHAT CARD */
      .chat-card {
        background: white;
        border-radius: 20px;
        padding: 35px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      }

      .title {
        font-weight: 600;
      }

      .form-control {
        border-radius: 12px;
        padding: 14px;
        background: #f5f7fb;
      }

      .btn-primary {
        border-radius: 12px;
        padding: 12px;
        background: linear-gradient(135deg, #339af0, #1c7ed6);
        border: none;
      }

      .btn-primary:hover {
        transform: scale(1.05);
      }

      /* ANSWER BOX */
      .answer-box {
        background: #f8f9fa;
        border-left: 5px solid #339af0;
        padding: 15px;
        border-radius: 10px;
        min-height: 80px;
        white-space: pre-wrap;
      }

      /* typing cursor */
      .cursor {
        display: inline-block;
        width: 3px;
        background: #333;
        margin-left: 2px;
        animation: blink 1s infinite;
      }

      @keyframes blink {
        0%, 50%, 100% { opacity: 1; }
        25%, 75% { opacity: 0; }
      }
    </style>
  </head>

  <body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/">
          <i class="bi bi-envelope-paper-fill"></i> MiniMailer
        </a>

        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="/">Home</a>
          <a class="nav-link" href="/index">Send Email</a>
          <a class="nav-link" href="{{ url_for('history') }}">History</a>
          <a class="nav-link active" href="{{ url_for('chat_help') }}">AI Help</a>
          <a class="nav-link text-danger" href="{{ url_for('logout') }}">Logout</a>
        </div>
      </div>
    </nav>

    <!-- 🔥 CHAT SECTION -->
    <div class="container mt-5 big-container">
      <div class="row justify-content-center">
        <div class="col-12">

          <div class="chat-card">

            <h3 class="text-center title mb-4">
              🤖 MiniMailer AI Help
            </h3>

            <form method="POST">
              <div class="mb-3">
                <label class="form-label">Ask your question</label>

                <input
                  type="text"
                  name="message"
                  class="form-control form-control-lg"
                  placeholder="Example: How to send email in MiniMailer?"
                  required
                />
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                  🚀 Ask AI
                </button>
              </div>
            </form>

            {% if reply %}

            <hr class="mt-4" />

            <h5>AI Answer</h5>

            <div class="answer-box" id="typedText"></div>

            <!-- hidden original text -->
            <div id="fullText" style="display:none;">
              {{ reply|safe }}
            </div>

            {% endif %}

          </div>

        </div>
      </div>
    </div>

    <!-- 🔥 TYPING ANIMATION JS -->
    <script>
      const text = document.getElementById("fullText");
      const output = document.getElementById("typedText");

      if (text && output) {
        let content = text.innerText;
        let i = 0;

        function typeEffect() {
          if (i < content.length) {
            output.innerHTML += content.charAt(i);
            i++;
            setTimeout(typeEffect, 20);
          } else {
            output.innerHTML += '<span class="cursor"></span>';
          }
        }

        window.onload = typeEffect;
      }
    </script>

  </body>
</html>
