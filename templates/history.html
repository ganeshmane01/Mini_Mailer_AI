<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Email History | MiniMailer</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        padding-top: 90px;
      }

      /* NAVBAR */
      .navbar {
        background: rgba(0, 0, 0, 0.7) !important;
        backdrop-filter: blur(10px);
      }

      .nav-link {
        color: white !important;
        transition: 0.3s;
      }

      .nav-link:hover {
        color: #ffd43b !important;
      }

      /* WRAPPER */
      .history-wrapper {
        max-width: 1100px;
        margin: auto;
      }

      /* CARD */
      .history-card {
        background: white;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        animation: fadeIn 0.8s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .history-title {
        font-weight: 600;
      }

      /* TABLE */
      .table thead {
        background: #f1f3f5;
      }

      .table th {
        font-weight: 500;
      }

      .badge-sent {
        background: #d1e7dd;
        color: #0f5132;
        padding: 6px 10px;
        border-radius: 8px;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/">
          <i class="bi bi-envelope-paper-fill"></i> MiniMailer
        </a>

        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="/">Home</a>
          <a class="nav-link" href="/index">Send Email</a>
          <a class="nav-link" href="{{ url_for('history') }}">History</a>
          <a class="nav-link" href="{{ url_for('chat_help') }}">AI Help</a>
          <a class="nav-link text-danger" href="{{ url_for('logout') }}"
            >Logout</a
          >
        </div>
      </div>
    </nav>

    <!-- CONTENT -->
    <div class="container history-wrapper">
      <div class="history-card">
        <h4 class="history-title mb-4">
          <i class="bi bi-clock-history"></i> Email History
        </h4>

        <!-- TABLE -->
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr>
                <th>#</th>
                <th>Sender</th>
                <th>Receiver</th>
                <th>Subject</th>
                <th>Date</th>
                <th>Status</th>
              </tr>
            </thead>

            <tbody>
              {% for email in emails %}
              <tr>
                <td>{{ loop.index }}</td>
                <td>{{ email.sender_email }}</td>
                <td>{{ email.receiver_email }}</td>
                <td>{{ email.subject }}</td>
                <td>{{ email.send_at }}</td>
                <td>
                  <span class="badge-sent">Sent</span>
                </td>
              </tr>

              {% else %}
              <tr>
                <td colspan="6" class="text-center text-muted">
                  No emails sent yet
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
