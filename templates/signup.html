<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sign Up | MiniMailer</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        min-height: 100vh;
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        padding-top: 90px;
      }

      /* NAVBAR */
      .navbar {
        background: rgba(0, 0, 0, 0.7) !important;
        backdrop-filter: blur(10px);
      }

      .nav-link {
        color: white !important;
        transition: 0.3s;
      }

      .nav-link:hover {
        color: #ffd43b !important;
      }

      /* CENTER CARD */
      .signup-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .signup-card {
        width: 100%;
        max-width: 450px;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        animation: cardEnter 0.8s ease;
      }

      @keyframes cardEnter {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .signup-title {
        text-align: center;
        font-weight: 600;
        margin-bottom: 25px;
      }

      .form-label {
        font-weight: 500;
      }

      .form-control {
        border-radius: 12px;
        padding: 12px;
        background: #f5f7fb;
        border: 1px solid #d0d7e2;
      }

      .form-control:focus {
        background: #fff;
        box-shadow: 0 0 0 2px #4dabf7;
      }

      .btn-primary {
        border-radius: 12px;
        padding: 12px;
        background: linear-gradient(135deg, #339af0, #1c7ed6);
        border: none;
      }

      .btn-primary:hover {
        transform: scale(1.05);
      }

      .alert-danger {
        background: #842029;
        border: none;
        color: white;
      }

      .alert-success {
        background: #198754;
        border: none;
        color: white;
      }

      .login-link {
        color: #339af0;
        text-decoration: none;
      }

      .login-link:hover {
        text-decoration: underline;
      }

      /* Hero text */
      .hero-text {
        text-align: center;
        color: white;
        margin-bottom: 30px;
      }
    </style>
  </head>

  <body>
    <!-- 🔥 NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/">
          <i class="bi bi-envelope-paper-fill"></i> MiniMailer
        </a>

        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="/">Home</a>
          <a class="nav-link" href="/index">Send Email</a>
          <a class="nav-link" href="{{ url_for('history') }}">History</a>
          <a class="nav-link" href="{{ url_for('chat_help') }}">AI Help</a>
          <a class="nav-link text-danger" href="{{ url_for('logout') }}"
            >Logout</a
          >
        </div>
      </div>
    </nav>

    <!-- HERO TEXT -->
    <div class="hero-text">
      <h2>Create Your Account 🚀</h2>
      <p>Start using AI MiniMailer today</p>
    </div>

    <!-- SIGNUP CARD -->
    <div class="signup-wrapper">
      <div class="signup-card">
        <h4 class="signup-title">
          <i class="bi bi-person-plus-fill"></i> Sign Up
        </h4>

        {% if error %}
        <div class="alert alert-danger text-center">{{ error }}</div>
        {% endif %} {% if success %}
        <div class="alert alert-success text-center">{{ success }}</div>
        {% endif %}

        <form method="POST">
          <div class="mb-3">
            <label class="form-label">
              <i class="bi bi-person-fill"></i> Username
            </label>
            <input
              type="text"
              name="username"
              class="form-control"
              placeholder="Enter username"
              required
            />
          </div>

          <div class="mb-4">
            <label class="form-label">
              <i class="bi bi-lock-fill"></i> Password
            </label>
            <input
              type="password"
              name="password"
              class="form-control"
              placeholder="Enter password"
              required
            />
          </div>

          <button class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right"></i> Sign Up
          </button>
        </form>

        <p class="text-center mt-3">
          Already have an account?
          <a href="{{ url_for('login') }}" class="login-link">Login</a>
        </p>
      </div>
    </div>
  </body>
</html>
